name: My First CI Pipeline

on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 下载我的代码
        uses: actions/checkout@v4

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装工具 (pytest 和 flake8)
        run: pip install pytest flake8   # 这里新增了 flake8

      - name: 4. 运行代码规范检查 (Lint)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics # 检查致命的语法错误

      - name: 5. 运行自动化测试
        run: pytest
